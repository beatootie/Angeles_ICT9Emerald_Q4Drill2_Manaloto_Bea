<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Q2 Drill 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<style>
body{
    font-family: 'Courier New', Courier, monospace;
}
.container{
    background-color: #1e2329;
    size: 280px;
    padding: 30px;
    border-radius: 25px;
}
h2{
    color:#ffbd02 ;
}
</style>
<body class="p-5">

    <div class="container" style="max-width: 500px;">
        <h2><b>Heat Index Checker</b></h2>
        <p style="color: white;">Input the temperature (°C) and humidity (%), then click Check to see the heat index and its status.</p>

        <div class="mt-3">
            <label style="color: white;">Degree in °C</label>
            <input type="number" id="temperatureInput" class="form-control" placeholder="Input degree value">
        </div>

        <div class="mt-3">
            <label style="color: white;">humidity in %</label>
            <input type="number" id="humidityInput" class="form-control" placeholder="Input percentage value">
        </div>

        <button onclick="checkheatindx()" class="btn btn-warning mt-3 w-100">Check</button>
    </div>

</html>
    <script>
        function checkheatindx() {
            var temp = parseFloat(document.getElementById("temperatureInput").value);
            var humidity = parseFloat(document.getElementById("humidityInput").value);

            var heatIndex = temp + (humidity * 0.25);
            var status;

            switch (true) {
                case (heatIndex <= 27):
                    status = "Comfortable / Cool";
                    break;
                case (heatIndex <= 32):
                    status = "Warmm";
                    break;
                 case (heatIndex <= 37):
                    status = "Very Hot / Caution";
                    break;
                case (heatIndex >= 42):
                    status = "Extreme Heat / Danger";
                    break;
            }

            alert("Heat Index: " + heatIndex.toFixed(1) + "°C\nStatus: " + status);
            document.getElementById("result").innerHTML = "Heat Index: " + heatIndex.toFixed(1) + "°C";
            document.getElementById("description").innerHTML = "Status: " + status;
        }
    </script>
</body>
